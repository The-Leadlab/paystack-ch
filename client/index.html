<!doctype html>
<html lang="fr">

  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/brand/paystack-final-logo.png" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#E8423F" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#160f12" media="(prefers-color-scheme: dark)" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="mobile-web-app-capable" content="yes" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <title>Paystack.ch — Swiss Financial Management Platform</title>
    <meta name="description" content="AI-powered financial management for Swiss businesses. Manage incomes, expenses, salaries, and reporting via document upload. Built for Switzerland." />
    <meta property="og:description" content="AI-powered financial management for Swiss businesses with multi-page invoice analysis, VAT extraction, and reporting." />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="dns-prefetch" href="https://www.googletagmanager.com" />

    <link rel="stylesheet" href="/critical.css" />

    <!-- Non-blocking webfonts (display=swap in URL) -->
    <link
      rel="preload"
      as="style"
      href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700&family=Source+Serif+4:opsz,wght@8..60,400;1,8..60,400&family=JetBrains+Mono:wght@400;500&display=swap"
    />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700&family=Source+Serif+4:opsz,wght@8..60,400;1,8..60,400&family=JetBrains+Mono:wght@400;500&display=swap"
      media="print"
      onload="this.media='all'"
    />
    <noscript>
      <link
        rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700&family=Source+Serif+4:opsz,wght@8..60,400;1,8..60,400&family=JetBrains+Mono:wght@400;500&display=swap"
      />
    </noscript>
  </head>

  <body>
    <!-- Outside #root so React mount does not remove it; must run route script after this exists (see bottom). -->
    <div id="static-app-lcp-fallback" hidden>
      <div class="static-app-lcp-wrap">
        <div class="static-app-lcp-main">
          <header class="static-app-lcp-header">
            <h1 class="static-app-lcp-title">Dashboard</h1>
          </header>
        </div>
      </div>
    </div>
    <div id="root">
      <!-- Static LCP fallback for landing (French default); hidden once React mounts -->
      <h1 id="static-hero-fallback" data-route="/">
        Vos finances, <span style="color:#e8423f">automatisees</span>
      </h1>
    </div>
    <script>
      (function () {
        var path = location.pathname || "/";
        var hero = document.getElementById("static-hero-fallback");
        var appShell = document.getElementById("static-app-lcp-fallback");
        var isHome = path === "/" || path === "";
        var isApp = path === "/app" || path.indexOf("/app/") === 0;
        if (hero) hero.hidden = !isHome;
        if (appShell) appShell.hidden = !isApp;
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>

</html>
