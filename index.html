
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Café de la Place | Suivi financier</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
    <style>
      body {
        font-family: 'Inter', sans-serif;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }
      .font-serif { font-family: 'Cormorant Garamond', Georgia, serif; }

      .custom-scrollbar::-webkit-scrollbar { width: 4px; }
      .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
      .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(184,160,106,0.3); border-radius: 10px; }
      .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: rgba(184,160,106,0.6); }

      /* Gold shimmer on logo text */
      .gold-text {
        background: linear-gradient(135deg, #c9a84c 0%, #e8d5a3 40%, #b8a06a 60%, #d4af6e 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }
    </style>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              cdlp: {
                black:  '#111111',
                dark:   '#1a1a1a',
                card:   '#222222',
                border: '#333333',
                gold:   '#b8a06a',
                'gold-light': '#d4af6e',
                'gold-pale':  '#e8d5a3',
                cream:  '#f5f0e8',
                muted:  '#888888',
              }
            },
            boxShadow: {
              'gold': '0 4px 24px rgba(184,160,106,0.15)',
              'card': '0 2px 16px rgba(0,0,0,0.4)',
            }
          }
        }
      }
    </script>
  <script type="importmap">

    "xlsx": "https://esm.sh/xlsx@^0.18.5"
  }
}
</script>
</head>
