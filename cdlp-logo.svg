<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" fill="none">
  <!-- Outer circle -->
  <circle cx="200" cy="200" r="180" stroke="currentColor" stroke-width="3" fill="none"/>
  
  <!-- Inner circle -->
  <circle cx="200" cy="200" r="130" stroke="currentColor" stroke-width="3" fill="none"/>
  
  <!-- Center X with CDLP -->
  <line x1="140" y1="140" x2="260" y2="260" stroke="currentColor" stroke-width="3"/>
  <line x1="260" y1="140" x2="140" y2="260" stroke="currentColor" stroke-width="3"/>
  
  <!-- Center letters C D L P -->
  <text x="170" y="190" font-family="Arial, sans-serif" font-size="48" font-weight="300" fill="currentColor" letter-spacing="8">C</text>
  <text x="220" y="190" font-family="Arial, sans-serif" font-size="48" font-weight="300" fill="currentColor" letter-spacing="8">D</text>
  <text x="170" y="240" font-family="Arial, sans-serif" font-size="48" font-weight="300" fill="currentColor" letter-spacing="8">L</text>
  <text x="220" y="240" font-family="Arial, sans-serif" font-size="48" font-weight="300" fill="currentColor" letter-spacing="8">P</text>
  
  <!-- Top arc text: CAFÉ DE LA PLACE -->
  <path id="topArc" d="M 60,200 A 140,140 0 0,1 340,200" fill="none"/>
  <text font-family="Arial, sans-serif" font-size="28" font-weight="300" fill="currentColor" letter-spacing="6">
    <textPath href="#topArc" startOffset="50%" text-anchor="middle">
      CAFÉ DE LA PLACE
    </textPath>
  </text>
  
  <!-- Bottom arc text: BISTROT GENÈVE -->
  <path id="bottomArc" d="M 340,200 A 140,140 0 0,1 60,200" fill="none"/>
  <text font-family="Arial, sans-serif" font-size="24" font-weight="300" fill="currentColor" letter-spacing="4">
    <textPath href="#bottomArc" startOffset="50%" text-anchor="middle">
      BISTROT GENÈVE
    </textPath>
  </text>
</svg>
